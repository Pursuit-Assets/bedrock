server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Silence missing favicon.ico requests
    location = /favicon.ico {
        return 204;
        access_log off;
    }

    # Proxy /api/* and /auth/* to the backend Cloud Run service so they
    # appear same-origin to the browser. Without this proxy the
    # access_token cookie is set on the *.run.app domain and gets
    # stripped as a third-party cookie by Safari ITP / Chrome strict /
    # Firefox ETP when the frontend at bedrock.pursuit.org tries to
    # read it.
    location /auth/ {
        proxy_pass https://financial-forecasting-api-es4rf2cguq-uc.a.run.app;
        proxy_set_header Host financial-forecasting-api-es4rf2cguq-uc.a.run.app;
        proxy_ssl_server_name on;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location /api/ {
        proxy_pass https://financial-forecasting-api-es4rf2cguq-uc.a.run.app;
        proxy_set_header Host financial-forecasting-api-es4rf2cguq-uc.a.run.app;
        proxy_ssl_server_name on;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # Handle React Router (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable cache for index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

